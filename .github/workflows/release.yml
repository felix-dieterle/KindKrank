name: Release APK

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode or generate keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD_SECRET: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS_SECRET: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD_SECRET: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD_SECRET" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=$KEY_ALIAS_SECRET" >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=$KEY_PASSWORD_SECRET" >> "$GITHUB_ENV"
          else
            STORE_PASS=$(openssl rand -base64 24)
            KEY_PASS=$(openssl rand -base64 24)
            echo "KEYSTORE_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=release" >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=$KEY_PASS" >> "$GITHUB_ENV"
            keytool -genkeypair -v -keystore app/keystore.jks \
              -alias "release" -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
              -dname "CN=KindKrank, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=DE" \
              -noprompt
          fi

      - name: Get version name
        id: version
        run: |
          VERSION=$(./gradlew -q app:printVersionName)
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ github.run_number }} \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/app/keystore.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Clean up keystore
        if: always()
        run: rm -f app/keystore.jks

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/KindKrank-v${{ steps.version.outputs.name }}-${{ github.run_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-${{ github.run_number }}
          name: KindKrank v${{ steps.version.outputs.name }} (Build ${{ github.run_number }})
          generate_release_notes: true
          files: app/build/outputs/apk/release/KindKrank-v${{ steps.version.outputs.name }}-${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
